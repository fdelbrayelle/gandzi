version: '3.9'
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gandzi
      POSTGRES_USER: gandzi
      POSTGRES_PASSWORD: gandzi
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - '8081:8080'
    volumes:
      - ./infra/keycloak/gandzi-realm.json:/opt/keycloak/data/import/gandzi-realm.json:ro

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gandzi
      SPRING_DATASOURCE_USERNAME: gandzi
      SPRING_DATASOURCE_PASSWORD: gandzi
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/gandzi
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - keycloak

  frontend:
    build:
      context: ./frontend
    ports:
      - '4321:4321'
    depends_on:
      - backend

volumes:
  pgdata:
